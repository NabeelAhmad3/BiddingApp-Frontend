<ng-container *ngIf="isAdminRoute(); else notAdmin">
  <router-outlet></router-outlet>
</ng-container>

<ng-template #notAdmin>
  <ng-container *ngIf="isHomeRoute(); else otherRoutes">
    <router-outlet></router-outlet>
    <app-footer></app-footer>
  </ng-container>
<ng-template #otherRoutes>
    <div class="d-flex flex-row justify-content-between bg-dark align-items-center px-3 py-2" 
         style="width: 100%; margin: 0;">
      <a class="navbar-brand" href="">
        <img src="assets/Logo.svg" alt="Logo" style="height: 60px;">
      </a>
      <app-header />
    </div>
    <router-outlet />
    <app-footer />
  </ng-template>
</ng-template>
