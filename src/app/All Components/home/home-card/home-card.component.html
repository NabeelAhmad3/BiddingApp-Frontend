<div class="product-card">
    <img [src]="image" alt="car image" class="card-image" />

    <div class="card-details">
        <p class="car-name">{{ carname }}</p>
        <p class="card-meta">ID: {{ productid }}</p>
        <p class="card-meta">Current bid: PKR {{ price.toLocaleString() }}</p>
        <p class="card-meta">{{ city }}</p>

        <button class="view-btn" *ngIf="isLoggedIn" data-bs-toggle="modal" data-bs-target="#setBidModal">
            Place bid
        </button>
        <button class="view-btn" *ngIf="!isLoggedIn" data-bs-toggle="modal" data-bs-target="#regModal">
            Place bid
        </button>
    </div>
</div>

<app-set-bid [productid]="productid" />
