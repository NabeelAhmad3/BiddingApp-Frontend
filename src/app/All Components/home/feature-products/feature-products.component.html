<section class="listings-section">
  <p class="section-title">Feature products</p>
  <div class="card-gallery">
    <div class="product-card" *ngFor="let item of cards">
      <img [src]="item.image" alt="car image" class="card-image" />
      <div class="card-details">
        <p class="car-name">{{ item.carname }}</p>
        <p class="card-meta">ID: {{ item.productid }}</p>
        <p class="card-meta">PKR {{ item.price.toLocaleString() }}</p>
        <p class="card-meta">{{ item.city }}</p>

        <button class="view-btn" *ngIf="isLoggedIn" (click)="localCardData(item.productid)" [routerLink]="['/details']">
          View details
        </button>

        <button class="view-btn" *ngIf="!isLoggedIn" data-bs-toggle="modal" data-bs-target="#regModal">
          View details
        </button>
      </div>
    </div>

    <p class="empty-msg" *ngIf="cards.length === 0">No products available.</p>
  </div>
</section>
